<svg xmlns="http://www.w3.org/2000/svg" width="760" height="260" viewBox="0 0 760 260" role="img" aria-labelledby="title desc">
  <title id="title">Copied asset flow</title>
  <desc id="desc">External Markdown and colocated assets are copied into VitePress srcDir before the site build.</desc>
  <rect width="760" height="260" rx="18" fill="#f8fafc"/>
  <rect x="24" y="24" width="712" height="212" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <g font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0f172a">
    <rect x="56" y="82" width="180" height="88" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="146" y="118" text-anchor="middle" font-weight="700">docs-content</text>
    <text x="146" y="145" text-anchor="middle" font-size="15">Markdown + assets</text>
    <path d="M256 126h84" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
    <path d="M340 126l-14-9v18z" fill="#334155"/>
    <rect x="364" y="82" width="180" height="88" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="454" y="118" text-anchor="middle" font-weight="700">srcDir</text>
    <text x="454" y="145" text-anchor="middle" font-size="15">materialized files</text>
    <path d="M564 126h84" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
    <path d="M648 126l-14-9v18z" fill="#334155"/>
    <rect x="672" y="82" width="36" height="88" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="690" y="120" text-anchor="middle" font-weight="700" transform="rotate(90 690 120)">build</text>
  </g>
